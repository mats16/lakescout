# This is a Databricks asset bundle definition for claude_agent_app.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: lakebrownie

include:
  - resources/*.yaml

# Exclude sensitive and unnecessary files from deployment
sync:
  exclude:
    - .env
    - .env.*
    - node_modules
    - "**/.git"
    - "**/.vscode"
    - "**/.turbo"          # Turborepoキャッシュ
    - "**/dist"            # ビルド成果物(必要に応じて)
    - "**/*.test.ts"       # テストファイル
    - "**/*.spec.ts"       # テストファイル
    - "**/coverage"        # カバレッジレポート

variables:
  app_name:
    description: The name of the app.
    default: lakebrownie-${bundle.target}-${workspace.current_user.id}

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name:
        default: lakebrownie-${bundle.target}
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
